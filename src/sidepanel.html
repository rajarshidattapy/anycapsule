<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnyLLM</title>
  <link rel="stylesheet" href="./sidepanel.css">
</head>
<body>
  <div class="sp-container">
    <header class="sp-header">
      <img src="assets/logo.png" alt="AnyLLM" class="sp-logo">
      <div class="sp-header-text">
        <h1>AnyLLM</h1>
        <p class="sp-platform" id="sp-platform">Detecting platform…</p>
      </div>
    </header>

    <nav class="sp-tabs" id="sp-tabs">
      <button class="sp-tab active" data-tab="pins" id="tab-pins">📌 Pins</button>
      <button class="sp-tab" data-tab="highlights" id="tab-highlights">🖍 Highlights</button>
      <button class="sp-tab" data-tab="context" id="tab-context">✦ Context</button>
      <button class="sp-tab" data-tab="tools" id="tab-tools">⚙ Tools</button>
    </nav>

    <main class="sp-body">
      <!-- PINS -->
      <section class="sp-pane active" id="pane-pins">
        <p class="sp-empty" id="pins-empty">No pinned messages yet. Hover a message on the page and click 📌.</p>
        <ul class="sp-pin-list" id="pins-list"></ul>
      </section>

      <!-- HIGHLIGHTS -->
      <section class="sp-pane" id="pane-highlights">
        <p class="sp-empty" id="highlights-empty">No highlights yet. Select text on the page to highlight it.</p>
        <ul class="sp-highlight-list" id="highlights-list"></ul>
      </section>

      <!-- CONTEXT -->
      <section class="sp-pane" id="pane-context">
        <button id="btn-extract" class="sp-btn primary">✦ Extract Context</button>
        <div id="context-result"></div>
      </section>

      <!-- TOOLS -->
      <section class="sp-pane" id="pane-tools">
        <button id="btn-toggle-deleted" class="sp-btn">
          <span id="btn-toggle-deleted-label">👁 Show Deleted</span>
        </button>
        <button id="btn-bulk-delete" class="sp-btn">🗑 Bulk Delete</button>
      </section>
    </main>

    <footer class="sp-footer">
      <span class="sp-version">v1.1.0</span>
    </footer>
  </div>

  <script type="module" src="./sidepanel.js"></script>
</body>
</html>
